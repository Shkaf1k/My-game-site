<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pixel Defenders</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#2b2b2b;
border:3px solid white;
margin-top:10px;
}

#ui{
margin:10px;
font-size:18px;
}

#shop button{
margin:5px;
padding:10px 15px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Pixel Defenders</h1>

<div id="ui">
💰 Деньги: <span id="money">100</span>
❤️ Жизни: <span id="lives">10</span>
🌊 Волна: <span id="wave">1</span>
</div>

<div id="shop">
<button onclick="selectTower(1)">🔵 Башня (50)</button>
<button onclick="selectTower(2)">🟢 Снайпер (70)</button>
<button onclick="selectTower(3)">🟠 Пушка (100)</button>
<button onclick="selectTower(4)">🚀 Ракета (150)</button>
</div>

<canvas id="gameCanvas" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let towers = [];
let enemies = [];

let money = 100;
let lives = 10;
let wave = 1;

let selectedTower = 1;

const moneyUI = document.getElementById("money");
const livesUI = document.getElementById("lives");
const waveUI = document.getElementById("wave");

let spawnTimer = 0;

const path = [
{x:0,y:250},
{x:250,y:250},
{x:250,y:120},
{x:600,y:120},
{x:600,y:350},
{x:900,y:350}
];

function selectTower(type){
selectedTower = type;
}

canvas.addEventListener("click", e=>{

const rect = canvas.getBoundingClientRect();
const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

let cost = 50;
let range = 120;
let damage = 0.6;

if(selectedTower===2){
cost = 70;
range = 220;
damage = 0.35;
}

if(selectedTower===3){
cost = 100;
range = 90;
damage = 1.3;
}

if(selectedTower===4){
cost = 150;
range = 160;
damage = 2;
}

if(money >= cost){

money -= cost;

towers.push({
x,y,range,damage,type:selectedTower
});

}

moneyUI.textContent = money;

});

function spawnEnemy(){

let type = "normal";

if(wave % 5 === 0) type = "boss";
else if(Math.random() < 0.35) type = "mid";

let hp = 100 + wave*30;
let speed = 1 + wave*0.2;
let reward = 20;

if(type==="mid"){
hp *= 2;
speed *= 0.8;
reward = 40;
}

if(type==="boss"){
hp *= 6;
speed *= 0.6;
reward = 150;
}

enemies.push({
x:path[0].x,
y:path[0].y,
pathIndex:0,
speed,
health:hp,
maxHealth:hp,
type,
reward
});

}

function moveEnemy(enemy){

let target = path[enemy.pathIndex+1];

if(!target) return;

let dx = target.x - enemy.x;
let dy = target.y - enemy.y;

let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < enemy.speed){

enemy.pathIndex++;

}else{

enemy.x += dx/dist * enemy.speed;
enemy.y += dy/dist * enemy.speed;

}

}

function drawPath(){

ctx.strokeStyle="#777";
ctx.lineWidth=40;

ctx.beginPath();

ctx.moveTo(path[0].x,path[0].y);

for(let p of path){
ctx.lineTo(p.x,p.y);
}

ctx.stroke();

ctx.lineWidth=1;

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawPath();

spawnTimer++;

if(spawnTimer > 100){

spawnEnemy();
spawnTimer = 0;

}

if(enemies.length===0){
wave++;
waveUI.textContent = wave;
}

for(let tower of towers){

if(tower.type===1) ctx.fillStyle="blue";
if(tower.type===2) ctx.fillStyle="green";
if(tower.type===3) ctx.fillStyle="orange";
if(tower.type===4) ctx.fillStyle="purple";

ctx.beginPath();
ctx.arc(tower.x,tower.y,18,0,Math.PI*2);
ctx.fill();

}

for(let i=enemies.length-1;i>=0;i--){

let enemy = enemies[i];

moveEnemy(enemy);

if(enemy.type==="normal") ctx.fillStyle="red";
if(enemy.type==="mid") ctx.fillStyle="magenta";
if(enemy.type==="boss") ctx.fillStyle="black";

ctx.fillRect(enemy.x-12,enemy.y-12,24,24);

ctx.fillStyle="lime";
ctx.fillRect(enemy.x-12,enemy.y-20,24*(enemy.health/enemy.maxHealth),4);

for(let tower of towers){

let dx = tower.x - enemy.x;
let dy = tower.y - enemy.y;

let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < tower.range){

ctx.strokeStyle="yellow";
ctx.beginPath();
ctx.moveTo(tower.x,tower.y);
ctx.lineTo(enemy.x,enemy.y);
ctx.stroke();

enemy.health -= tower.damage;

}

}

if(enemy.health <= 0){

money += enemy.reward;

moneyUI.textContent = money;

enemies.splice(i,1);

}

else if(enemy.pathIndex >= path.length-1){

enemies.splice(i,1);

lives--;

livesUI.textContent = lives;

if(lives <= 0){

alert("Game Over");

location.reload();

}

}

}

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
