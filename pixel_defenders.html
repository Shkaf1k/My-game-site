<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Defenders</title>

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin-top:10px;
}

#gameUI{
margin:auto;
width:900px;
background:#020617;
padding:10px;
border-radius:10px;
}

canvas{
background:#1e293b;
border:3px solid #334155;
display:block;
margin:auto;
}

#topUI{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:18px;
}

#shop{
margin-top:10px;
}

button{
background:#6366f1;
border:none;
color:white;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#4f46e5;
}

</style>
</head>

<body>

<h1>🛡 Pixel Defenders</h1>

<div id="gameUI">

<div id="topUI">
<div>❤️ HP: <span id="hp">20</span></div>
<div>💰 Gold: <span id="gold">100</span></div>
<div>🌊 Wave: <span id="wave">1</span></div>
</div>

<canvas id="game" width="900" height="500"></canvas>

<div id="shop">
<button onclick="buyTower()">🏹 Buy Tower (50)</button>
</div>

</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let hp = 20
let gold = 100
let wave = 1

let enemies = []
let towers = []
let bullets = []

let placingTower = false

const path = [
{x:0,y:250},
{x:300,y:250},
{x:300,y:120},
{x:650,y:120},
{x:650,y:380},
{x:900,y:380}
]

function updateUI(){
document.getElementById("hp").textContent = hp
document.getElementById("gold").textContent = gold
document.getElementById("wave").textContent = wave
}

function buyTower(){

if(gold < 50) return

placingTower = true

}

canvas.onclick = e => {

if(!placingTower) return

let rect = canvas.getBoundingClientRect()

let x = e.clientX - rect.left
let y = e.clientY - rect.top

towers.push({
x:x,
y:y,
cooldown:0
})

gold -= 50

placingTower = false

updateUI()

}

function spawnEnemy(){

enemies.push({
x:path[0].x,
y:path[0].y,
hp:40 + wave*10,
speed:0.7,
pathIndex:0
})

}

setInterval(spawnEnemy,2000)

function updateEnemies(){

for(let e of enemies){

let target = path[e.pathIndex+1]

if(!target){

hp--

updateUI()

enemies.splice(enemies.indexOf(e),1)

if(hp<=0){
alert("Game Over")
location.reload()
}

continue

}

let dx = target.x - e.x
let dy = target.y - e.y

let dist = Math.hypot(dx,dy)

if(dist < 2){

e.pathIndex++

}else{

e.x += dx/dist * e.speed
e.y += dy/dist * e.speed

}

}

}

function updateTowers(){

for(let t of towers){

t.cooldown--

if(t.cooldown <= 0){

let target = enemies.find(e=>Math.hypot(e.x-t.x,e.y-t.y)<150)

if(target){

bullets.push({
x:t.x,
y:t.y,
target:target
})

t.cooldown = 40

}

}

}

}

function updateBullets(){

for(let b of bullets){

if(!b.target){
bullets.splice(bullets.indexOf(b),1)
continue
}

let dx = b.target.x - b.x
let dy = b.target.y - b.y

let dist = Math.hypot(dx,dy)

b.x += dx/dist * 5
b.y += dy/dist * 5

if(dist < 10){

b.target.hp -= 20

if(b.target.hp <= 0){

gold += 15

enemies.splice(enemies.indexOf(b.target),1)

updateUI()

}

bullets.splice(bullets.indexOf(b),1)

}

}

}

function drawPath(){

ctx.strokeStyle="#94a3b8"
ctx.lineWidth=30

ctx.beginPath()

ctx.moveTo(path[0].x,path[0].y)

for(let p of path){
ctx.lineTo(p.x,p.y)
}

ctx.stroke()

}

function drawEnemies(){

for(let e of enemies){

ctx.fillStyle="#ef4444"

ctx.beginPath()

ctx.arc(e.x,e.y,12,0,Math.PI*2)

ctx.fill()

}

}

function drawTowers(){

for(let t of towers){

ctx.fillStyle="#22c55e"

ctx.beginPath()

ctx.arc(t.x,t.y,14,0,Math.PI*2)

ctx.fill()

}

}

function drawBullets(){

ctx.fillStyle="#facc15"

for(let b of bullets){

ctx.beginPath()

ctx.arc(b.x,b.y,5,0,Math.PI*2)

ctx.fill()

}

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawPath()

updateEnemies()
updateTowers()
updateBullets()

drawEnemies()
drawTowers()
drawBullets()

requestAnimationFrame(gameLoop)

}

setInterval(()=>{
wave++
updateUI()
},20000)

updateUI()

gameLoop()

</script>

</body>
</html>
