<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pixel Defenders V3</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center;}
h1{font-size:48px;margin-top:40px;}
button{padding:12px 25px;margin:8px;font-size:18px;border:none;border-radius:8px;background:#6366f1;color:white;cursor:pointer;}
button:hover{background:#4f46e5;}
#menu,#game,#scores{display:none;}
canvas{background:#1e293b;border:3px solid #334155;display:block;margin:auto;}
#topUI{width:900px;margin:auto;display:flex;justify-content:space-between;font-size:18px;padding:10px;}
#shop{width:900px;margin:auto;}
#shop button{font-size:14px;padding:8px 12px;}
#tooltip{position:absolute;background:#111827;padding:8px;border-radius:6px;font-size:14px;display:none;pointer-events:none;}
</style>
</head>
<body>

<div id="menu">
<h1>🛡 Pixel Defenders</h1>
<button onclick="startGame()">▶ Start Game</button><br>
<button onclick="showScores()">🏆 Leaderboard</button>
</div>

<div id="scores">
<h1>🏆 Leaderboard</h1>
<div id="scoreList" style="text-align:left; max-width:400px; margin:auto; font-size:18px;"></div>
<button onclick="backMenu()">⬅ Back</button>
</div>

<div id="game">
<div id="topUI">
<div>❤️ HP: <span id="hp"></span></div>
<div>💰 Gold: <span id="gold"></span></div>
<div>🌊 Wave: <span id="wave"></span></div>
</div>

<canvas id="canvas" width="900" height="500"></canvas>

<div id="shop">
<button class="towerBtn">🏹 Basic (50)</button>
<button class="towerBtn">🔥 Fast (70)</button>
<button class="towerBtn">💥 Sniper (90)</button>
<button class="towerBtn">❄ Slow (80)</button>
<button class="towerBtn">💣 Cannon (120)</button>
</div>
</div>

<div id="tooltip"></div>
<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c1e8b.mp3" loop></audio>

<script>
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
let hp,gold,wave
let enemies=[],towers=[],bullets=[]
let draggingTower=null, mouseX=0, mouseY=0

let maps=[
[{x:0,y:250},{x:300,y:250},{x:300,y:120},{x:700,y:120},{x:700,y:400},{x:900,y:400}],
[{x:0,y:100},{x:400,y:100},{x:400,y:350},{x:800,y:350},{x:800,y:200},{x:900,y:200}]
]

let path
const hpEl=document.getElementById("hp")
const goldEl=document.getElementById("gold")
const waveEl=document.getElementById("wave")

function updateUI(){ hpEl.textContent=hp; goldEl.textContent=gold; waveEl.textContent=wave; }

function startGame(){
document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"
document.getElementById("music").play()
hp=20; gold=120; wave=1
path=maps[Math.floor(Math.random()*maps.length)]
loadGame()
updateUI()
setInterval(spawnEnemy,2000)
setInterval(()=>wave++,20000)
setInterval(saveGame,5000)
gameLoop()
}

function spawnEnemy(){
if(wave % 5 === 0){
enemies.push({x:path[0].x,y:path[0].y,hp:600 + wave*50,speed:0.5,i:0,boss:true})
return
}
let type=Math.floor(Math.random()*5)
let stats=[{hp:40,speed:1},{hp:80,speed:0.6},{hp:25,speed:1.8},{hp:120,speed:0.4},{hp:60,speed:1.2}]
let s=stats[type]
enemies.push({x:path[0].x,y:path[0].y,hp:s.hp+wave*5,speed:s.speed,i:0,boss:false})
}

function updateEnemies(){
for(let e of enemies){
let t=path[e.i+1]
if(!t){
hp--; enemies.splice(enemies.indexOf(e),1); updateUI();
if(hp<=0){
let playerName = prompt("Game Over! Введите своё имя для Leaderboard:","Player")
if(!playerName) playerName="Player"
saveScore(playerName)
showScores()
}
continue }
let dx=t.x-e.x, dy=t.y-e.y, d=Math.hypot(dx,dy)
if(d<2){ e.i++ }else{ e.x+=dx/d*e.speed; e.y+=dy/d*e.speed }
}
}

function updateTowers(){
for(let t of towers){
t.cool--
if(t.cool<=0){
let range=[120,100,200,120,140], rate=[40,10,70,50,80]
let target=enemies.find(e=>Math.hypot(e.x-t.x,e.y-t.y)<range[t.type])
if(target){ bullets.push({x:t.x,y:t.y,target:target,type:t.type}); t.cool=rate[t.type] }
}
}
}

function updateBullets(){
for(let b of bullets){
if(!b.target){ bullets.splice(bullets.indexOf(b),1); continue }
let dx=b.target.x-b.x, dy=b.target.y-b.y, d=Math.hypot(dx,dy)
b.x+=dx/d*5; b.y+=dy/d*5
if(d<10){
let dmg=[20,10,60,15,40]; b.target.hp-=dmg[b.type]
if(b.target.hp<=0){ gold+=20; enemies.splice(enemies.indexOf(b.target),1); updateUI() }
bullets.splice(bullets.indexOf(b),1)
}
}
}

function drawPath(){ ctx.strokeStyle="#94a3b8"; ctx.lineWidth=30; ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y); for(let p of path) ctx.lineTo(p.x,p.y); ctx.stroke() }

function drawEnemies(){
for(let e of enemies){
if(e.boss){ ctx.fillStyle="purple"; ctx.beginPath(); ctx.arc(e.x,e.y,20,0,Math.PI*2); ctx.fill() }else{ ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(e.x,e.y,12,0,Math.PI*2); ctx.fill() }
}
}

function drawTowers(){ let colors=["green","yellow","white","cyan","orange"]; for(let t of towers){ ctx.fillStyle=colors[t.type]; ctx.beginPath(); ctx.arc(t.x,t.y,14,0,Math.PI*2); ctx.fill() } }

function drawBullets(){ ctx.fillStyle="gold"; for(let b of bullets){ ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill() } }

function gameLoop(){
ctx.clearRect(0,0,900,500)
drawPath(); updateEnemies(); updateTowers(); updateBullets(); drawEnemies(); drawTowers(); drawBullets()
if(draggingTower){ ctx.globalAlpha=0.5; ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(mouseX,mouseY,14,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1 }
requestAnimationFrame(gameLoop)
}

canvas.addEventListener("mousemove",e=>{ let rect=canvas.getBoundingClientRect(); mouseX=e.clientX-rect.left; mouseY=e.clientY-rect.top })
canvas.onclick=()=>{ if(!draggingTower) return; let cost=[50,70,90,80,120]; if(gold<cost[draggingTower.type]) return; towers.push({x:mouseX,y:mouseY,type:draggingTower.type,cool:0}); gold-=cost[draggingTower.type]; draggingTower=null; updateUI() }

const buttons=document.querySelectorAll(".towerBtn")
buttons.forEach((b,i)=>{ b.onclick=()=>{ draggingTower={type:i} } })

const tooltip=document.getElementById("tooltip")
const towerInfo=["Basic: средний урон","Fast: очень быстрая стрельба","Sniper: огромный урон","Slow: замедляет врагов","Cannon: мощный урон"]
buttons.forEach((b,i)=>{
b.onmouseover=e=>{ tooltip.style.display="block"; tooltip.innerText=towerInfo[i] }
b.onmousemove=e=>{ tooltip.style.left=e.pageX+10+"px"; tooltip.style.top=e.pageY+10+"px" }
b.onmouseleave=()=>{ tooltip.style.display="none" }
})

function saveGame(){ let data={hp,gold,wave,towers}; localStorage.setItem("pixel_save",JSON.stringify(data)) }
function loadGame(){ let data=JSON.parse(localStorage.getItem("pixel_save")); if(!data) return; hp=data.hp; gold=data.gold; wave=data.wave; towers=data.towers }

function saveScore(name){
let scores=JSON.parse(localStorage.getItem("scores")||[])
scores.push({name:name,wave:wave})
scores.sort((a,b)=>b.wave-a.wave)
scores=scores.slice(0,10)
localStorage.setItem("scores",JSON.stringify(scores))
}

function showScores(){
document.getElementById("menu").style.display="none"
document.getElementById("scores").style.display="block"
let scores=JSON.parse(localStorage.getItem("scores")||[])
let html="<ol>"
for(let s of scores){ html+=`<li>${s.name}: 🌊${s.wave}</li>` }
html+="</ol>"
document.getElementById("scoreList").innerHTML=html
if(scores[0].wave===wave){
const first=document.querySelector("#scoreList li:first-child")
if(first){ first.style.color="#f59e0b"; first.style.transition="all 0.5s"; first.style.transform="scale(1.2)"; setTimeout(()=>{first.style.transform="scale(1)"; first.style.color="white"},1000) }
}
}

function backMenu(){ document.getElementById("scores").style.display="none"; document.getElementById("menu").style.display="block" }
document.getElementById("menu").style.display="block"
</script>
</body>
</html>
