<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAME PROJECT | NEXT GEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0055;
            --secondary: #00dbde;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: #fff;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Запрещаем горизонтальный скролл */
            width: 100%;
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            z-index: -2;
        }

        nav {
            position: fixed;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .logo { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--primary); }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2rem, 8vw, 6rem); /* Резиновый шрифт */
            margin: 0;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-wrap: break-word;
            line-height: 1.1;
        }

        .hero p {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            letter-spacing: 2px;
            margin-top: 20px;
            max-width: 90%;
        }

        .btn-glow {
            margin-top: 30px;
            padding: 15px 40px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.9rem;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
        }

        section { padding: 60px 20px; max-width: 1200px; margin: auto; }

        .section-header {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-header::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(to right, var(--primary), transparent);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .feature-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 10px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .img-box {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        footer {
            padding: 40px 20px;
            text-align: center;
            font-size: 0.7rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Планшеты и телефоны */
        @media (max-width: 768px) {
            nav { padding: 15px; }
            section { padding: 40px 15px; }
            .hero { height: auto; padding-top: 120px; padding-bottom: 60px; }
            .btn-glow { padding: 12px 30px; width: 80%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <nav>
        <div class="logo">VOID_ENGINE</div>
        <div class="menu" style="font-size: 0.7rem;">BETA v1.0</div>
    </nav>

    <div class="hero">
        <h1 data-aos="zoom-out">PROJECT_ONE</h1>
        <p data-aos="fade-up" data-aos-delay="300">SURVIVE THE UNKNOWN EXODUS</p>
        <a href="#download" class="btn-glow">DOWNLOAD</a>
    </div>

    <section id="about">
        <div class="section-header" data-aos="fade-right">CORE_SYSTEMS</div>
        <div class="features-grid">
            <div class="feature-card" data-aos="fade-up">
                <h3 style="color:var(--primary); font-size: 1.1rem;">01. PHYSICS</h3>
                <p style="font-size: 0.9rem;">Реалистичная модель повреждений объектов.</p>
            </div>
            <div class="feature-card" data-aos="fade-up" data-aos-delay="100">
                <h3 style="color:var(--primary); font-size: 1.1rem;">02. NEURAL_AI</h3>
                <p style="font-size: 0.9rem;">Враги, которые учатся на твоих действиях.</p>
            </div>
        </div>
    </section>

    <section id="media">
        <div class="section-header" data-aos="fade-right">VISUAL_DATA</div>
        <div class="gallery">
            <div class="img-box" data-aos="zoom-in">
                <img src="Screenshot 1.png" alt="Screen 1">
            </div>
            <div class="img-box" data-aos="zoom-in" data-aos-delay="100">
                <img src="Screenshot 2.png" alt="Screen 2">
            </div>
        </div>
    </section>

    <section id="download" style="text-align: center;">
        <div class="feature-card" style="border: 1px solid var(--primary);">
            <h2 style="font-size: 1.2rem;">READY?</h2>
            <a href="#" class="btn-glow" style="display: block; margin: 20px auto;">GET CLIENT</a>
        </div>
    </section>

    <footer>
        &copy; 2026 VOID_STUDIO. MOBILE OPTIMIZED.
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
