<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID ENGINE | NEXT GEN</title>

<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
:root {
    --primary:#ff0055;
    --secondary:#00dbde;
    --bg:#050505;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;cursor:none;}
body{
    font-family:'Montserrat',sans-serif;
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

/* PRELOADER */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}
.loader-text{
    font-family:'Syncopate';
    color:var(--primary);
    animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.2;}}

/* SCROLL BAR */
#scrollBar{
    position:fixed;
    top:0;
    left:0;
    height:3px;
    background:var(--primary);
    width:0%;
    z-index:9999;
}

/* CURSOR */
#cursor{
    width:20px;height:20px;
    background:var(--primary);
    position:fixed;
    border-radius:50%;
    pointer-events:none;
    z-index:9999;
    box-shadow:0 0 20px var(--primary);
}

/* STARS */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(10px);
    z-index:100;
}
.logo{
    font-family:'Syncopate';
    color:var(--primary);
    letter-spacing:5px;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.glitch{
    font-family:'Syncopate';
    font-size:5rem;
    animation:glitch 3s infinite;
}
@keyframes glitch{
    0%{text-shadow:2px 0 cyan,-2px 0 red;}
    2%{text-shadow:6px 0 cyan,-6px 0 red;}
    100%{text-shadow:2px 0 cyan,-2px 0 red;}
}

.btn-glow{
    margin-top:40px;
    padding:15px 40px;
    border:1px solid #fff;
    text-decoration:none;
    color:#fff;
    position:relative;
    overflow:hidden;
}
.btn-glow:hover{
    background:#fff;
    color:#000;
}

/* SECTION */
section{
    padding:100px 5%;
    max-width:1200px;
    margin:auto;
}
.section-header{
    font-family:'Syncopate';
    margin-bottom:40px;
    color:var(--secondary);
}

/* NEWS */
.news-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
.news-card{
    padding:20px;
    border:1px solid rgba(255,255,255,0.1);
    transition:.3s;
}
.news-card:hover{
    border-color:var(--primary);
}

/* VIDEO */
.video-wrapper{
    position:relative;
    padding-bottom:56.25%;
}
.video-wrapper iframe{
    position:absolute;
    width:100%;
    height:100%;
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    opacity:0.4;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><div class="loader-text">INITIALIZING...</div></div>

<!-- SCROLL -->
<div id="scrollBar"></div>

<!-- CURSOR -->
<div id="cursor"></div>

<!-- STARS -->
<canvas id="stars"></canvas>

<!-- SOUND -->
<audio id="clickSound" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<nav>
<div class="logo">VOID_ENGINE</div>
<div>ALPHA_BUILD</div>
</nav>

<div class="hero">
<h1 class="glitch">Project_One</h1>
<p>Deep Space Survival Simulation</p>
<a href="#" class="btn-glow">Initialize Access</a>
</div>

<section>
<div class="section-header">SYSTEM_UPDATES</div>
<div class="news-grid">
<div class="news-card">Atmospheric Update</div>
<div class="news-card">Neural AI v2.4</div>
<div class="news-card">Void Fixes</div>
</div>
</section>

<section>
<div class="section-header">DECRYPTED_FEED</div>
<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
</div>
</section>

<footer>VOID STUDIO © 2026</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
AOS.init();

/* LOADER */
window.onload=()=>document.getElementById("loader").style.display="none";

/* SCROLL BAR */
window.addEventListener("scroll",()=>{
let s=window.scrollY;
let h=document.body.scrollHeight-window.innerHeight;
document.getElementById("scrollBar").style.width=(s/h)*100+"%";
});

/* CURSOR SMOOTH */
let mouseX=0,mouseY=0,cX=0,cY=0;
const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
mouseX=e.clientX;
mouseY=e.clientY;
});

function animate(){
cX+=(mouseX-cX)*0.15;
cY+=(mouseY-cY)*0.15;
cursor.style.left=cX+"px";
cursor.style.top=cY+"px";
requestAnimationFrame(animate);
}
animate();

/* CURSOR HOVER */
document.querySelectorAll("a,.news-card").forEach(el=>{
el.addEventListener("mouseenter",()=>{
cursor.style.transform="scale(3)";
cursor.style.background="transparent";
cursor.style.border="1px solid white";
});
el.addEventListener("mouseleave",()=>{
cursor.style.transform="scale(1)";
cursor.style.background="var(--primary)";
cursor.style.border="none";
});
});

/* SOUND */
document.querySelectorAll("a").forEach(el=>{
el.addEventListener("click",()=>{
document.getElementById("clickSound").play();
});
});

/* STARS */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=Array(120).fill().map(()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*2
}));

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(st=>{
ctx.beginPath();
ctx.arc(st.x,st.y,st.s,0,Math.PI*2);
ctx.fill();
st.y+=0.3;
if(st.y>canvas.height)st.y=0;
});
requestAnimationFrame(draw);
}
draw();

/* PARALLAX */
window.addEventListener("scroll",()=>{
document.querySelector(".hero").style.transform=
`translateY(${window.scrollY*0.3}px)`;
});
</script>

</body>
</html>
