<!DOCTYPE html>
<html>
<head>
<title>My Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

/* меню */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.6);
padding:15px;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-size:18px;
}

/* главный экран */

.hero{
margin-top:120px;
}

.hero h1{
font-size:70px;
}

.download{
font-size:28px;
padding:15px 40px;
border:none;
border-radius:12px;
background:#00ff9d;
cursor:pointer;
transition:0.3s;
}

.download:hover{
transform:scale(1.15);
background:#00cc7a;
}

/* скриншоты */

.gallery{
margin-top:60px;
}

.gallery img{
width:300px;
margin:10px;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.1);
}

/* карточка */

.card{
width:600px;
margin:auto;
margin-top:50px;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
}

</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#screens">Screenshots</a>
<a href="#about">About</a>
</nav>

<div class="hero">

<h1>MY GAME</h1>
<p>An indie game made by me</p>

<a href="game.zip">
<button class="download">Download</button>
</a>

</div>

<div id="screens" class="gallery">

<h2>Screenshots</h2>

<img src="screen1.png">
<img src="screen2.png">
<img src="screen3.png">

</div>

<div id="about" class="card">

<h2>About the game</h2>

<p>
This is my indie game.  
Explore the world, survive and have fun.
More updates coming soon.
</p>

</div>

</body>
</html>
