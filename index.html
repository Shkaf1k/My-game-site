<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID ENGINE ULTRA</title>

<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#0f0;
font-family:monospace;
overflow:hidden;
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:20px;
}

/* PLANET */
#planet{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:400px;
height:400px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%, #0ff, #001);
box-shadow:0 0 100px #0ff;
animation:spin 20s linear infinite;
}
@keyframes spin{
0%{transform:translate(-50%,-50%) rotate(0);}
100%{transform:translate(-50%,-50%) rotate(360deg);}
}

/* TERMINAL */
#terminal{
position:absolute;
bottom:0;
width:100%;
height:40%;
background:rgba(0,0,0,0.8);
padding:10px;
overflow:auto;
}

input{
width:100%;
background:black;
color:#0f0;
border:none;
outline:none;
}

/* FADE */
.fade{
position:fixed;
width:100%;
height:100%;
background:black;
opacity:0;
pointer-events:none;
transition:1s;
}
</style>
</head>

<body>

<div id="loader">LOADING VOID SYSTEM...</div>

<div id="planet"></div>

<div id="terminal">
<div id="output"></div>
<input id="input" placeholder="type command...">
</div>

<div class="fade" id="fade"></div>

<script>

/* LOADER */
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2000);

/* TERMINAL */
const input=document.getElementById("input");
const output=document.getElementById("output");

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
let cmd=input.value;
output.innerHTML+="<div>> "+cmd+"</div>";

if(cmd==="help"){
output.innerHTML+="<div>commands: help, clear, scan, ai</div>";
}
else if(cmd==="clear"){
output.innerHTML="";
}
else if(cmd==="scan"){
output.innerHTML+="<div>Scanning planet... life detected</div>";
}
else if(cmd==="ai"){
output.innerHTML+="<div>AI: Welcome, pilot.</div>";
}
else{
output.innerHTML+="<div>unknown command</div>";
}

input.value="";
}
});

/* CINEMATIC FADE */
function transition(){
let f=document.getElementById("fade");
f.style.opacity=1;
setTimeout(()=>f.style.opacity=0,1000);
}

/* AUTO TRANSITIONS */
setInterval(transition,8000);

</script>

</body>
</html>
