<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY GAME | Official Website</title>

    <!-- Favicon -->
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="shortcut icon" href="favicon.png" type="image/png">

    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0b;
            --primary: #6366f1; 
            --tester-accent: #f59e0b; 
            --support-glow: #ec4899;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --card-bg: #111113;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        #hero-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .support-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 2000;
            background: var(--support-glow); color: white; text-decoration: none;
            padding: 15px 25px; border-radius: 50px; font-family: 'Montserrat';
            font-weight: 900; font-size: 12px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3); transition: 0.4s;
            animation: pulse-support 2s infinite;
        }
        @keyframes pulse-support { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; padding: 20px 10%; align-items: center;
        }
        .logo { font-family: 'Montserrat'; font-weight: 900; letter-spacing: 2px; font-size: 20px; }
        .nav-links a { color: var(--text-dim); text-decoration: none; margin-left: 30px; font-size: 13px; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }

        .hero {
            height: 100vh; position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 20px;
        }
        .hero-content { position: relative; z-index: 1; }
        .hero h1 { font-family: 'Montserrat'; font-size: clamp(40px, 8vw, 100px); font-weight: 900; text-transform: uppercase; letter-spacing: -2px; margin-bottom: 20px; }
        
        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        .btn-main { background: var(--primary); color: #fff; padding: 18px 45px; text-decoration: none; border-radius: 8px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .btn-outline { padding: 18px 45px; border: 2px solid #fff; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .btn-outline:hover { background: #fff; color: #000; }

        /* --- СИСТЕМНЫЕ ТРЕБОВАНИЯ --- */
        .specs-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        .specs-card { background: var(--card-bg); border: 1px solid var(--border); padding: 40px; border-radius: 20px; transition: 0.3s; }
        .specs-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .specs-card h3 { font-family: 'Montserrat'; font-size: 20px; margin-bottom: 25px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .specs-list { list-style: none; }
        .specs-list li { margin-bottom: 15px; font-size: 14px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 8px; }
        .specs-list li span { color: var(--text-dim); }

        /* Видеоплеер */
        .video-container { max-width: 1000px; margin: 0 auto; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); background: #000; }
        video { width: 100%; display: block; }

        /* Списки изменений */
        .changelog-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .change-card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 12px; }
        .version-tag { background: var(--primary); color: white; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 900; font-family: 'Montserrat'; margin-bottom: 15px; display: inline-block; }

        /* Галерея */
        .slider-container { position: relative; width: 100%; max-width: 1000px; margin: 0 auto; overflow: hidden; border-radius: 15px; }
        .slides { display: flex; transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; aspect-ratio: 16/9; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0, 0, 0, 0.5); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(5px); z-index: 10; }
        .prev { left: 20px; } .next { right: 20px; }

        /* Секции */
        .section { padding: 100px 10%; }
        .section-title { font-family: 'Montserrat'; font-size: 32px; margin-bottom: 50px; text-align: center; }
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Команда */
        .team-group h3 { font-family: 'Montserrat'; font-size: 20px; margin-bottom: 30px; border-left: 4px solid var(--primary); padding-left: 15px; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .team-card { background: var(--card-bg); padding: 40px; border-radius: 12px; border: 1px solid var(--border); }
        .role { font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .role.dev { color: var(--primary); }
        .role.tester { color: var(--tester-accent); }

        footer { text-align: center; padding: 60px; opacity: 0.3; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <canvas id="hero-canvas"></canvas>

    <a href="#" class="support-btn">❤️ ПОДДЕРЖАТЬ ПРОЕКТ</a>

    <nav>
        <div class="logo">MY GAME</div>
        <div class="nav-links">
            <a href="#trailer">ТРЕЙЛЕР</a>
            <a href="#gallery">ГАЛЕРЕЯ</a>
            <a href="#specs">ТРЕБОВАНИЯ</a>
            <a href="#updates">ОБНОВЛЕНИЯ</a>
            <a href="#team">КОМАНДА</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>EXPLORE THE VOID</h1>
            <p style="color: var(--text-dim); margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto;">
                Погрузитесь в захватывающее приключение. Исследуйте миры, созданные с душой и вниманием к деталям.
            </p>
            <div class="btn-group">
                <a href="game.zip" class="btn-main">СКАЧАТЬ v1.0</a>
                <a href="#specs" class="btn-outline">ХАРАКТЕРИСТИКИ</a>
            </div>
        </div>
    </header>

    <!-- Остальной контент сайта без изменений -->

    <script>
        // Слайдер
        let currentIdx = 0;
        const track = document.getElementById('track');
        function move(dir) {
            const slides = document.querySelectorAll('.slide');
            currentIdx = (currentIdx + dir + slides.length) % slides.length;
            track.style.transform = `translateX(-${currentIdx * 100}%)`;
        }

        // Звезды
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.5 });
            }
        }
        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
                star.y += star.speed; if (star.y > canvas.height) star.y = 0;
            });
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('resize', initStars); initStars(); drawStars();

        // Появление
        function reveal() {
            document.querySelectorAll('.reveal').forEach(r => {
                if (r.getBoundingClientRect().top < window.innerHeight - 150) r.classList.add('active');
            });
        }
        window.addEventListener('scroll', reveal); reveal();
    </script>
</body>
</html>
