<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY GAME | Official Website</title>
<style>
:root {
  --bg: #0a0a0b;
  --primary: #6366f1; 
  --tester-accent: #f59e0b; 
  --support-glow: #ec4899;
  --text-main: #ffffff;
  --text-dim: #94a3b8;
  --card-bg: #111113;
  --border: rgba(255, 255, 255, 0.05);
}
* { box-sizing: border-box; margin:0; padding:0; scroll-behavior: smooth; }
body { font-family:'Inter', sans-serif; background-color:var(--bg); color:var(--text-main); line-height:1.6; overflow-x:hidden; }
#hero-canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

.support-btn { position:fixed; bottom:30px; right:30px; z-index:2000; background:var(--support-glow); color:white; text-decoration:none; padding:15px 25px; border-radius:50px; font-family:'Montserrat'; font-weight:900; font-size:12px; display:flex; align-items:center; gap:10px; box-shadow:0 10px 20px rgba(236,72,153,0.3); transition:0.4s; animation:pulse-support 2s infinite;}
@keyframes pulse-support {0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}

nav {position:fixed; top:0; width:100%; z-index:1000; background:rgba(10,10,11,0.8); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; padding:20px 10%; align-items:center;}
.logo { font-family:'Montserrat'; font-weight:900; letter-spacing:2px; font-size:20px; }
.nav-links a { color: var(--text-dim); text-decoration:none; margin-left:30px; font-size:13px; font-weight:600; transition:0.3s; }
.nav-links a:hover { color:#fff; }

.hero { height:100vh; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 20px; }
.hero-content { position:relative; z-index:1; }
.hero h1 { font-family:'Montserrat'; font-size:clamp(40px,8vw,100px); font-weight:900; text-transform:uppercase; letter-spacing:-2px; margin-bottom:20px; }

.btn-group { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin-top:30px; }
.btn-main { background: var(--primary); color:#fff; padding:18px 45px; text-decoration:none; border-radius:8px; font-weight:700; text-transform:uppercase; transition:0.3s; }
.btn-main:hover { opacity:0.9; }
.btn-outline { padding:18px 45px; border:2px solid #fff; color:#fff; text-decoration:none; border-radius:8px; font-weight:700; text-transform:uppercase; transition:0.3s; }
.btn-outline:hover { background:#fff; color:#000; }

#score { margin-top:10px; font-size:1.2em; }
</style>
</head>
<body>

<canvas id="hero-canvas"></canvas>

<a href="#" class="support-btn">❤️ ПОДДЕРЖАТЬ ПРОЕКТ</a>

<nav>
  <div class="logo">MY GAME</div>
  <div class="nav-links">
    <a href="#trailer">ТРЕЙЛЕР</a>
    <a href="#gallery">ГАЛЕРЕЯ</a>
    <a href="#specs">ТРЕБОВАНИЯ</a>
    <a href="#updates">ОБНОВЛЕНИЯ</a>
    <a href="#team">КОМАНДА</a>
  </div>
</nav>

<header class="hero">
  <div class="hero-content">
    <h1>EXPLORE THE VOID</h1>
    <p style="color:var(--text-dim); max-width:600px; margin:0 auto 40px auto;">
      Погрузитесь в захватывающее приключение. Исследуйте миры, созданные с душой и вниманием к деталям.
    </p>
    <div class="btn-group">
      <!-- Кнопка теперь открывает игру в новой вкладке -->
      <a href="pixel_defenders.html" target="_blank" class="btn-main">ИГРАТЬ СЕЙЧАС</a>
      <a href="#specs" class="btn-outline">ХАРАКТЕРИСТИКИ</a>
    </div>
    <div id="score">Очки: 0</div>
  </div>
</header>

<script>
// Звезды на фоне
const canvasStars = document.getElementById('hero-canvas');
const ctx = canvasStars.getContext('2d');
let stars = [];
function initStars() {
  canvasStars.width = window.innerWidth;
  canvasStars.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({ x: Math.random()*canvasStars.width, y: Math.random()*canvasStars.height, size: Math.random()*2, speed: Math.random()*0.5 });
  }
}
function drawStars() {
  ctx.clearRect(0,0,canvasStars.width,canvasStars.height);
  ctx.fillStyle = '#fff';
  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI*2);
    ctx.fill();
    star.y += star.speed;
    if (star.y > canvasStars.height) star.y = 0;
  });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', initStars);
initStars();
drawStars();

// Анимация reveal
function reveal() {
  document.querySelectorAll('.reveal').forEach(r=>{
    if (r.getBoundingClientRect().top < window.innerHeight -150) r.classList.add('active');
  });
}
window.addEventListener('scroll', reveal);
reveal();
</script>

</body>
</html>
