<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID ENGINE</title>

<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#ff0055;
--secondary:#00f0ff;
--bg:#050505;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
background: radial-gradient(circle at 30% 30%, #111, #000);
color:#fff;
font-family:'Montserrat';
overflow-x:hidden;
}

/* ANIMATED BG */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background: radial-gradient(circle, rgba(255,0,85,0.08), transparent 60%);
animation:moveBG 20s linear infinite;
z-index:-1;
}
@keyframes moveBG{
0%{transform:translate(0,0);}
50%{transform:translate(-25%,-25%);}
100%{transform:translate(0,0);}
}

/* NAV */
nav{
position:fixed;
width:100%;
padding:20px 50px;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:100;
}

.logo{
font-family:'Syncopate';
color:var(--primary);
letter-spacing:5px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.glitch{
font-size:6rem;
font-family:'Syncopate';
position:relative;
color:#fff;
text-shadow:0 0 20px var(--primary);
animation:flicker 2s infinite;
}

@keyframes flicker{
0%,100%{opacity:1;}
50%{opacity:0.8;}
}

.hero p{
opacity:0.6;
letter-spacing:3px;
}

/* BUTTON */
.btn{
margin-top:40px;
padding:18px 50px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
color:#fff;
text-decoration:none;
transition:.4s;
position:relative;
overflow:hidden;
}

.btn:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 0 30px var(--primary);
border-color:var(--primary);
}

/* SECTIONS */
section{
padding:120px 5%;
max-width:1200px;
margin:auto;
}

.title{
font-family:'Syncopate';
margin-bottom:50px;
color:var(--secondary);
}

/* CARDS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.1);
padding:30px;
transition:.4s;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(120deg, transparent, rgba(255,0,85,0.2), transparent);
top:-100%;
left:0;
transition:.5s;
}

.card:hover::before{
top:100%;
}

.card:hover{
transform:translateY(-10px);
border-color:var(--primary);
box-shadow:0 0 25px rgba(255,0,85,0.3);
}

/* VIDEO */
.video{
position:relative;
padding-bottom:56.25%;
border:1px solid rgba(255,255,255,0.1);
}

.video iframe{
position:absolute;
width:100%;
height:100%;
}

/* FOOTER */
footer{
text-align:center;
padding:50px;
opacity:0.5;
font-size:12px;
}
</style>
</head>

<body>

<nav>
<div class="logo">VOID_ENGINE</div>
<div>ALPHA 2026</div>
</nav>

<div class="hero">
<h1 class="glitch">PROJECT_ONE</h1>
<p>Deep Space Survival Simulation</p>
<a href="#" class="btn">INITIALIZE ACCESS</a>
</div>

<section>
<h2 class="title">SYSTEM UPDATES</h2>
<div class="grid">
<div class="card">Atmospheric Engine Upgrade</div>
<div class="card">Neural AI v2.4</div>
<div class="card">Black Hole Physics Fix</div>
</div>
</section>

<section>
<h2 class="title">DECRYPTED FEED</h2>
<div class="video">
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
</div>
</section>

<section>
<h2 class="title">VISUAL ARCHIVE</h2>
<div class="grid">
<div class="card">Screenshot 01</div>
<div class="card">Screenshot 02</div>
</div>
</section>

<footer>
VOID STUDIO © 2026 // NEXT GEN EXPERIENCE
</footer>

</body>
</html>
